<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiragana Word Matching</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fdf8f5;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            width: 95vw;
            height: 95vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2vh;
            background-color: white;
            padding: 1.5vh 4vw;
            border-radius: 100px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            flex-shrink: 0;
        }

        .title {
            font-size: clamp(20px, 3vw, 40px);
            font-weight: bold;
            color: #333;
        }

        .title span { color: #ff6b6b; }

        .timer {
            background-color: #ff6b6b;
            color: white;
            padding: 1vh 2vw;
            border-radius: 10px;
            font-size: clamp(16px, 2vw, 26px);
            font-weight: bold;
            min-width: 10vw;
            text-align: center;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5vw;
            padding: 0 1vw;
            flex: 1;
            align-content: center;
        }

        .card {
            aspect-ratio: 0.85;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            user-select: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }

        .card.hiragana {
            background-color: #b8a9d9;
            border: clamp(3px, 0.4vw, 5px) solid white;
            font-family: 'Klee One', cursive;
            font-weight: 600;
            font-size: clamp(32px, 5.5vw, 90px);
            color: white;
            letter-spacing: 0.05em;
        }

        .card.image-card {
            background-color: white;
            border: clamp(3px, 0.4vw, 5px) solid #b8a9d9;
            padding: 8%;
        }

        .card.image-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .card.selected {
            border: 5px solid #b8a9d9 !important;
            box-shadow: 0 0 28px rgba(184,169,217,0.55), 0 8px 20px rgba(0,0,0,0.15);
            transform: scale(1.05);
        }

        .card.matched {
            opacity: 0.28;
            cursor: default;
            pointer-events: none;
        }

        .card.wrong {
            animation: shake 0.2s;
            border-color: #f44336 !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .card:hover:not(.matched):not(.selected) {
            transform: scale(1.07) translateY(-6px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .restart-button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            width: clamp(32px, 3.5vw, 46px);
            height: clamp(32px, 3.5vw, 46px);
            border-radius: 50%;
            font-size: clamp(14px, 1.8vw, 20px);
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255,107,107,0.3);
            transition: all 0.3s ease;
            display: none;
            align-items: center;
            justify-content: center;
            margin-left: 2vw;
        }

        .restart-button.show { display: flex; }
        .restart-button:hover { transform: scale(1.1) rotate(90deg); }

        .confetti {
            position: fixed;
            width: 12px; height: 12px;
            top: -10px;
            z-index: 9999;
            pointer-events: none;
            border-radius: 2px;
        }

        @keyframes confetti-fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1 class="title">Hiragana <span>Word</span> Matching</h1>
        <div style="display:flex;align-items:center;">
            <div class="timer" id="timer">00:00</div>
            <button class="restart-button" id="restartBtn" onclick="restartGame()">↻</button>
        </div>
    </div>
    <div class="game-board" id="gameBoard"></div>
</div>

    };

    const cardsTemplate = [
        { type: 'hiragana', value: 'あか', pair: 'img_あか' },
        { type: 'hiragana', value: 'いえ', pair: 'img_いえ' },
        { type: 'hiragana', value: 'うた', pair: 'img_うた' },
        { type: 'hiragana', value: 'えき', pair: 'img_えき' },
        { type: 'hiragana', value: 'あお', pair: 'img_あお' },
        { type: 'image-card', value: 'img_あか', pair: 'あか', word: 'あか' },
        { type: 'image-card', value: 'img_いえ', pair: 'いえ', word: 'いえ' },
        { type: 'image-card', value: 'img_うた', pair: 'うた', word: 'うた' },
        { type: 'image-card', value: 'img_えき', pair: 'えき', word: 'えき' },
        { type: 'image-card', value: 'img_あお', pair: 'あお', word: 'あお' }
    ];

    let selectedCards = [], matchedPairs = 0, startTime, timerInterval;
    let gameStarted = false, isChecking = false;

    function playCorrect() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 523.25; osc.type = 'sine';
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
    }

    function playWrong() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 200; osc.type = 'sawtooth';
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    }

    function playCelebration() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
            const osc = ctx.createOscillator(), g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = freq; osc.type = 'sine';
            const t = ctx.currentTime + i * 0.15;
            g.gain.setValueAtTime(0.3, t);
            g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        });
    }

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function initGame() {
        const board = document.getElementById('gameBoard');
        board.innerHTML = '';
        shuffle(cardsTemplate).forEach((card, idx) => {
            const el = document.createElement('div');
            el.className = 'card ' + card.type;
            el.dataset.value = card.value;
            el.dataset.pair = card.pair;
            el.dataset.index = idx;

            if (card.type === 'hiragana') {
                el.textContent = card.value;
            } else {
                const img = document.createElement('img');
                img.src = IMAGES[card.word];
                img.alt = card.word;
                el.appendChild(img);
            }

            el.addEventListener('click', handleClick);
            board.appendChild(el);
        });
    }

    function handleClick(e) {
        if (!gameStarted) { startTimer(); gameStarted = true; }
        const card = e.currentTarget;
        if (card.classList.contains('matched') || card.classList.contains('selected') || isChecking) return;
        if (selectedCards.length >= 2) return;
        card.classList.add('selected');
        selectedCards.push(card);
        if (selectedCards.length === 2) checkMatch();
    }

    function checkMatch() {
        isChecking = true;
        const [c1, c2] = selectedCards;
        if (c1.dataset.value === c2.dataset.pair && c2.dataset.value === c1.dataset.pair) {
            playCorrect();
            c1.classList.add('matched'); c2.classList.add('matched');
            c1.classList.remove('selected'); c2.classList.remove('selected');
            matchedPairs++;
            selectedCards = [];
            isChecking = false;
            if (matchedPairs === 5) endGame();
        } else {
            playWrong();
            c1.classList.add('wrong'); c2.classList.add('wrong');
            setTimeout(() => {
                c1.classList.remove('selected', 'wrong');
                c2.classList.remove('selected', 'wrong');
                selectedCards = [];
                isChecking = false;
            }, 120);
        }
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const e = Date.now() - startTime;
            const m = Math.floor(e / 60000), s = Math.floor((e % 60000) / 1000);
            document.getElementById('timer').textContent =
                String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }, 100);
    }

    function createConfetti() {
        const colors = ['#9b8ec4','#4ecdc4','#45b7d1','#f9ca24','#a29bfe','#fd79a8'];
        for (let i = 0; i < 100; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.textContent = ['●','■','★'][Math.floor(Math.random()*3)];
            c.style.left = Math.random()*100 + 'vw';
            c.style.color = colors[Math.floor(Math.random()*colors.length)];
            c.style.fontSize = (Math.random()*15+12) + 'px';
            c.style.animation = 'confetti-fall ' + (Math.random()*3+2) + 's linear ' + (Math.random()*0.5) + 's forwards';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 6000);
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        playCelebration();
        createConfetti();
        document.getElementById('restartBtn').classList.add('show');
    }

    function restartGame() {
        document.getElementById('restartBtn').classList.remove('show');
        selectedCards = []; matchedPairs = 0; gameStarted = false; isChecking = false;
        clearInterval(timerInterval);
        document.getElementById('timer').textContent = '00:00';
        initGame();
    }

    initGame();
</script>
